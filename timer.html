<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Today's treat – Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .timer-skip-btn {
        background: transparent;
        border: none;
        font-family: inherit;
        font-size: 14px;
        font-weight: 400;
        color: #b3b3b3;
        cursor: pointer;
        margin-bottom: 48px;
        line-height: 1.3;
      }
    </style>
  </head>
  <body>
    <div class="device-shell">
      <main class="phone">

        <!-- Status bar / safe area -->
        <div class="timer-top-safe">
          <div class="dynamic-island" aria-hidden="true"></div>
        </div>

        <!-- Back + profile pill -->
        <div class="timer-nav-pill">
          <img
            src="https://www.figma.com/api/mcp/asset/5d29d5f0-f86a-4c73-9abd-8deabb28bd6c"
            alt="Back"
          />
          <img
            src="https://www.figma.com/api/mcp/asset/1f3e194a-75f9-46d5-93e4-2fbc60295c66"
            alt="Profile"
          />
        </div>

        <!-- Timer body -->
        <div class="timer-body">
          <h1 class="timer-title">Today's treat</h1>

          <div class="timer-circle-section">
            <div class="timer-circle-wrap">
              <!-- Stroke circle -->
              <img
                class="timer-ring"
                src="https://www.figma.com/api/mcp/asset/67ef5a3d-3c91-4682-a33a-8a8a9e00fa3b"
                alt=""
                aria-hidden="true"
              />

              <!-- Centred cat + countdown -->
              <div class="timer-center">
                <img
                  class="timer-cat-icon"
                  src="https://www.figma.com/api/mcp/asset/6d0f3be0-7f31-4fc1-8937-576b987a84ee"
                  alt="Cool cat"
                />
                <p class="timer-time" id="timer-display">05:00</p>
              </div>

              <!-- Pause / resume button -->
              <button
                class="timer-pause-btn"
                id="pause-btn"
                aria-label="Pause timer"
                aria-pressed="false"
              >
                <img
                  id="pause-icon"
                  src="https://www.figma.com/api/mcp/asset/9aed6ffd-6e58-405a-b63d-40f173e8abab"
                  alt=""
                  aria-hidden="true"
                />
              </button>
            </div>
          </div>

          <!-- Done button -->
          <a class="timer-done-btn" href="done.html">I'm done</a>

          <!-- Skip — bail without marking it done -->
          <button type="button" class="timer-skip-btn" id="timer-skip-btn">
            Skip for now
          </button>
        </div>

        <div class="home-indicator" aria-hidden="true"></div>
      </main>
    </div>

    <script>
      (function () {
        /* Read treat-specific data stored by index.html */
        var storedSecs   = parseInt(sessionStorage.getItem("activeTreatSecs"), 10);
        var totalSeconds = (!isNaN(storedSecs) && storedSecs > 0) ? storedSecs : 5 * 60;

        /* Show treat name as title */
        var treatName = sessionStorage.getItem("activeTreatName");
        if (treatName) {
          var titleEl = document.querySelector(".timer-title");
          if (titleEl) titleEl.textContent = treatName;
        }

        /* Show treat icon */
        var treatIcon = sessionStorage.getItem("activeTreatIcon");
        if (treatIcon) {
          var iconEl = document.querySelector(".timer-cat-icon");
          if (iconEl) iconEl.src = treatIcon;
        }
        var remaining = totalSeconds;
        var running = true;
        var interval = null;

        var display = document.getElementById("timer-display");
        var pauseBtn = document.getElementById("pause-btn");

        function format(s) {
          var m = Math.floor(s / 60);
          var sec = s % 60;
          return (m < 10 ? "0" : "") + m + ":" + (sec < 10 ? "0" : "") + sec;
        }

        /* Show correct time immediately */
        display.textContent = format(remaining);

        function tick() {
          if (remaining <= 0) {
            clearInterval(interval);
            running = false;
            display.textContent = "00:00";
            return;
          }
          remaining--;
          display.textContent = format(remaining);
        }

        interval = setInterval(tick, 1000);

        pauseBtn.addEventListener("click", function () {
          if (running) {
            clearInterval(interval);
            running = false;
            pauseBtn.setAttribute("aria-pressed", "true");
            pauseBtn.setAttribute("aria-label", "Resume timer");
          } else {
            interval = setInterval(tick, 1000);
            running = true;
            pauseBtn.setAttribute("aria-pressed", "false");
            pauseBtn.setAttribute("aria-label", "Pause timer");
          }
        });

        /* ── Skip: mark first pending treat as skipped, go home ── */
        var skipBtn = document.getElementById("timer-skip-btn");
        if (skipBtn) {
          skipBtn.addEventListener("click", function () {
            clearInterval(interval);
            try {
              var treats = JSON.parse(sessionStorage.getItem("morningTreats")) || [];
              for (var i = 0; i < treats.length; i++) {
                if (treats[i].status === "pending") {
                  treats[i].status = "skipped";
                  break;
                }
              }
              sessionStorage.setItem("morningTreats", JSON.stringify(treats));
            } catch (e) {}
            window.location.href = "index.html";
          });
        }
      })();
    </script>
  </body>
</html>
