<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prepare Your Morning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      /* ── Prepare-screen layout ───────────────────────────── */
      .prep-scroll {
        position: absolute;
        top: 64px;
        left: 0;
        width: 393px;
        height: 692px;
        overflow-y: auto;
        overflow-x: hidden;
        background: var(--cream);
        scrollbar-width: none;
      }
      .prep-scroll::-webkit-scrollbar { display: none; }

      .prep-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 56px;
        padding: 94px 24px 40px;
        width: 100%;
      }

      /* ── Heading block ───────────────────────────────────── */
      .prep-heading {
        display: flex;
        flex-direction: column;
        gap: 16px;
        align-items: center;
        text-align: center;
        color: var(--ink);
        width: 100%;
      }

      .prep-title {
        margin: 0;
        font-size: 26px;
        font-weight: 600;
        line-height: 1.3;
      }

      .prep-subtitle {
        margin: 0;
        font-size: 15px;
        font-weight: 400;
        line-height: 1.3;
        color: var(--ink);
      }

      /* ── Option cards ────────────────────────────────────── */
      .prep-options {
        display: flex;
        flex-direction: column;
        gap: 16px;
        width: 100%;
      }

      .prep-option-card {
        width: 100%;
        background: var(--card-tan);
        border: none;
        border-radius: 15px;
        padding: 15px 20px;
        display: flex;
        align-items: center;
        cursor: pointer;
        transition: background 0.18s, box-shadow 0.18s;
        text-align: left;
        box-shadow: none;
      }

      .prep-option-card.selected {
        box-shadow: 0px 4px 8px 0px rgba(78, 75, 61, 0.25);
      }

      /* Per-card selected colors set via JS inline style */

      .prep-option-inner {
        display: flex;
        flex-direction: column;
        gap: 16px;
        align-items: flex-start;
        width: 100%;
      }

      .prep-option-icon {
        width: 32px;
        height: 32px;
        display: block;
        object-fit: contain;
      }

      .prep-option-copy {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .prep-option-title {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        line-height: 1.3;
        color: var(--ink);
      }

      .prep-option-desc {
        margin: 0;
        font-size: 15px;
        font-weight: 500;
        line-height: 1.3;
        color: var(--ink);
      }

      /* ── Continue button ─────────────────────────────────── */
      .prep-continue-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-bottom: 50px;
        width: 224px;
      }

      .prep-continue-btn {
        width: 100%;
        padding: 16px;
        border-radius: 100px;
        background: var(--ink);
        color: var(--cream);
        border: none;
        font-family: inherit;
        font-size: 17px;
        font-weight: 500;
        line-height: normal;
        cursor: pointer;
        text-align: center;
        opacity: 0.4;
        transition: opacity 0.18s;
      }

      .prep-continue-btn.active {
        opacity: 1;
      }

      /* ── Back chevron ────────────────────────────────────── */
      .prep-back {
        position: absolute;
        top: 72px;
        left: 24px;
        z-index: 3;
        display: flex;
        align-items: center;
        gap: 4px;
        background: none;
        border: none;
        padding: 0;
        cursor: pointer;
        font-family: inherit;
        font-size: 15px;
        font-weight: 500;
        color: var(--muted-letter);
      }

      .prep-back svg {
        width: 10px;
        height: 18px;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="device-shell">
      <main class="phone">

        <!-- Status bar safe area -->
        <div class="top-safe">
          <div class="dynamic-island" aria-hidden="true"></div>
        </div>

        <!-- Back button -->
        <button type="button" class="prep-back" onclick="history.back()" aria-label="Go back">
          <svg width="10" height="18" viewBox="0 0 10 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M9 1L1 9L9 17" stroke="#4E4B3D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

        <!-- Scrollable content -->
        <section class="prep-scroll">
          <div class="prep-inner">

            <!-- Heading -->
            <div class="prep-heading">
              <h1 class="prep-title">A little something for tomorrow?</h1>
              <p class="prep-subtitle">Pick what fits your energy tonight,<br>both are good</p>
            </div>

            <!-- Option cards -->
            <div class="prep-options" role="group" aria-label="Preparation style">

              <!-- Set up tonight -->
              <button
                type="button"
                class="prep-option-card"
                id="opt-setup"
                data-value="setup"
                aria-pressed="false"
              >
                <div class="prep-option-inner">
                  <img
                    class="prep-option-icon"
                    src="https://www.figma.com/api/mcp/asset/ff995cc9-d461-4f44-985f-80f43809b76b"
                    alt=""
                  />
                  <div class="prep-option-copy">
                    <p class="prep-option-title">Set up tonight</p>
                    <p class="prep-option-desc">For a smoother morning</p>
                  </div>
                </div>
              </button>

              <!-- Keep it simple -->
              <button
                type="button"
                class="prep-option-card"
                id="opt-simple"
                data-value="noprep"
                aria-pressed="false"
              >
                <div class="prep-option-inner">
                  <img
                    class="prep-option-icon"
                    src="https://www.figma.com/api/mcp/asset/75244306-9d3c-4f0b-9512-3aa8a8b8bd44"
                    alt=""
                  />
                  <div class="prep-option-copy">
                    <p class="prep-option-title">Keep it simple</p>
                    <p class="prep-option-desc">No prep needed</p>
                  </div>
                </div>
              </button>

            </div>

            <!-- Continue -->
            <div class="prep-continue-wrap">
              <button
                type="button"
                class="prep-continue-btn"
                id="prep-continue"
                disabled
              >
                Continue
              </button>
            </div>

            <!-- Sun illustration -->
            <div class="sun" aria-hidden="true">
              <img class="sun-img" src="./assets/logo/sun.png" alt="" width="119" height="117" />
            </div>

          </div>
        </section>

        <!-- Bottom nav -->
                                        <nav class="bottom-nav" aria-label="Bottom navigation">
          <div class="bottom-nav-inner">
            <a class="nav-btn nav-active" href="index.html" aria-label="Home">
              <img class="nav-home nav-icon-default" src="assets/icons/nav/home.svg" alt="" />
              <img class="nav-home nav-icon-active"  src="assets/icons/nav/home-active.png" alt="" />
            </a>
            <a class="nav-btn" href="add.html" aria-label="Add">
              <img class="nav-plus nav-icon-default" src="assets/icons/nav/add.svg" alt="" />
              <img class="nav-plus nav-icon-active"  src="assets/icons/nav/add-active.png" alt="" />
            </a>
            <a class="nav-btn" href="calendar.html" aria-label="Calendar">
              <img class="nav-cal nav-icon-default" src="assets/icons/nav/calendar.svg" alt="" />
              <img class="nav-cal nav-icon-active"  src="assets/icons/nav/calendar-active.png" alt="" />
            </a>
          </div>
        </nav>
        <div class="home-indicator" aria-hidden="true"></div>

      </main>
    </div>

    <script>
      (function () {
        var cards      = document.querySelectorAll(".prep-option-card");
        var continueBtn = document.getElementById("prep-continue");
        var selected   = null;

        /* Selected color per option */
        var COLORS = { "setup": "#d4eeff", "noprep": "#fff5c5" };

        cards.forEach(function (card) {
          card.addEventListener("click", function () {
            /* Deselect all */
            cards.forEach(function (c) {
              c.classList.remove("selected");
              c.style.background = "";
              c.setAttribute("aria-pressed", "false");
            });

            /* Select tapped card with its Figma color */
            card.classList.add("selected");
            card.style.background = COLORS[card.dataset.value] || "";
            card.setAttribute("aria-pressed", "true");
            selected = card.dataset.value;

            /* Activate continue */
            continueBtn.disabled = false;
            continueBtn.classList.add("active");
          });
        });

        continueBtn.addEventListener("click", function () {
          if (!selected) return;
          sessionStorage.setItem("prepType", selected);
          window.location.href = selected === "setup" ? "prep-setup.html" : "prep-simple.html";
        });
      })();
    </script>
  </body>
</html>
