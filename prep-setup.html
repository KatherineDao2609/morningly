<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set Up Tonight</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      /* ── Scroll area ─────────────────────────────────────── */
      .pick-scroll {
        position: absolute;
        top: 64px;
        left: 0;
        width: 393px;
        height: 692px;
        overflow-y: auto;
        overflow-x: hidden;
        background: var(--cream);
        scrollbar-width: none;
      }
      .pick-scroll::-webkit-scrollbar { display: none; }

      .pick-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 64px;
        padding: 94px 24px 40px;
        width: 100%;
      }

      /* ── Back button ─────────────────────────────────────── */
      .pick-back {
        position: absolute;
        top: 72px;
        left: 24px;
        z-index: 3;
        display: flex;
        align-items: center;
        gap: 4px;
        background: none;
        border: none;
        padding: 0;
        cursor: pointer;
        font-family: inherit;
        font-size: 15px;
        font-weight: 500;
        color: var(--muted-letter);
      }
      .pick-back svg {
        width: 10px;
        height: 18px;
        display: block;
      }

      /* ── Heading ─────────────────────────────────────────── */
      .pick-heading {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
        text-align: center;
        color: var(--ink);
        width: 100%;
      }
      .pick-title {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
        line-height: 1.3;
      }
      .pick-subtitle {
        margin: 0;
        font-size: 17px;
        font-weight: 400;
        line-height: 1.3;
        color: var(--ink);
      }

      /* ── Treat list ──────────────────────────────────────── */
      .pick-list-wrap {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
        width: 100%;
      }

      .pick-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 100%;
      }

      /* ── Single treat card ───────────────────────────────── */
      .pick-card {
        width: 100%;
        background: var(--card-tan);
        border-radius: 15px;
        padding: 15px 20px;
        display: flex;
        flex-direction: column;
        cursor: pointer;
        border: 2px solid transparent;
        transition: background 0.2s, border-color 0.2s;
        text-align: left;
        font-family: inherit;
      }

      .pick-card.selected {
        border-color: var(--ink);
      }

      .pick-card-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
      }

      .pick-card-left {
        display: flex;
        flex-direction: column;
        gap: 16px;
        align-items: flex-start;
        flex: 1;
        min-width: 0;
      }

      .pick-card-icon {
        width: 32px;
        height: 32px;
        display: block;
        object-fit: contain;
        flex-shrink: 0;
        /* icon keeps its own color regardless of card selection */
        filter: none;
      }

      .pick-card-title {
        margin: 0;
        font-size: 17px;
        font-weight: 700;
        line-height: 1.3;
        color: var(--muted-letter);
        /* title color stays constant */
      }

      /* Short subtitle (hidden by default) */
      .pick-card-desc {
        margin: 6px 0 0;
        font-size: 14px;
        font-weight: 400;
        line-height: 1.4;
        color: var(--muted-letter);
        display: none;
      }
      .pick-card-desc.visible {
        display: block;
      }

      /* Chevron button */
      .pick-chevron {
        flex-shrink: 0;
        width: 24px;
        height: 24px;
        background: none;
        border: none;
        padding: 0;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s;
        color: var(--muted-letter);
      }
      .pick-chevron.open {
        transform: rotate(180deg);
      }
      .pick-chevron svg {
        width: 16px;
        height: 16px;
        display: block;
      }

      /* ── Shuffle icon ────────────────────────────────────── */
      .pick-shuffle {
        width: 24px;
        height: 24px;
        background: none;
        border: none;
        padding: 0;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted-letter);
        flex-shrink: 0;
        transition: transform 0.3s;
      }
      .pick-shuffle:active { transform: rotate(180deg); }
      .pick-shuffle svg { width: 20px; height: 20px; display: block; }

      /* ── CTA group ───────────────────────────────────────── */
      .pick-cta-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        width: 224px;
      }

      .pick-cta-btn {
        width: 100%;
        padding: 16px;
        border-radius: 100px;
        background: var(--ink);
        color: var(--cream);
        border: none;
        font-family: inherit;
        font-size: 17px;
        font-weight: 500;
        line-height: normal;
        cursor: pointer;
        text-align: center;
        opacity: 0.4;
        transition: opacity 0.2s;
      }
      .pick-cta-btn.active { opacity: 1; }

      .pick-remind {
        font-size: 17px;
        font-weight: 500;
        color: var(--grey);
        text-decoration: none;
        text-align: center;
        background: none;
        border: none;
        cursor: pointer;
        font-family: inherit;
        line-height: normal;
      }
    </style>
  </head>
  <body>
    <div class="device-shell">
      <main class="phone">

        <div class="top-safe">
          <div class="dynamic-island" aria-hidden="true"></div>
        </div>

        <button type="button" class="pick-back" onclick="history.back()" aria-label="Go back">
          <svg width="10" height="18" viewBox="0 0 10 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M9 1L1 9L9 17" stroke="#4E4B3D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

        <section class="pick-scroll">
          <div class="pick-inner">

            <!-- Heading -->
            <div class="pick-heading">
              <h1 class="pick-title">What would you like to set up for tomorrow?</h1>
              <p class="pick-subtitle">Just a few minutes tonight</p>
            </div>

            <!-- Treat list + shuffle -->
            <div class="pick-list-wrap">
              <div class="pick-list" id="pick-list" role="group" aria-label="Choose a treat to set up">
                <!-- Cards injected by JS -->
              </div>
              <button type="button" class="pick-shuffle" id="shuffle-btn" aria-label="Shuffle treats">
                <!-- shuffle icon -->
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path d="M16 3h5v5M4 20l5.5-5.5M21 3l-6.5 6.5M16 21h5v-5M4 4l5.5 5.5M21 21l-6.5-6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>

            <!-- CTA -->
            <div class="pick-cta-group">
              <button type="button" class="pick-cta-btn" id="cta-btn" disabled>
                I'll do this tonight
              </button>
              <button type="button" class="pick-remind" id="remind-btn">
                Remind me later
              </button>
            </div>

            <!-- Sun -->
            <div class="sun" aria-hidden="true">
              <img class="sun-img" src="./assets/logo/sun.png" alt="" width="119" height="117" />
            </div>

          </div>
        </section>

                                        <nav class="bottom-nav" aria-label="Bottom navigation">
          <div class="bottom-nav-inner">
            <a class="nav-btn nav-active" href="index.html" aria-label="Home">
              <img class="nav-home nav-icon-default" src="assets/icons/nav/home.svg" alt="" />
              <img class="nav-home nav-icon-active"  src="assets/icons/nav/home-active.png" alt="" />
            </a>
            <a class="nav-btn" href="add.html" aria-label="Add">
              <img class="nav-plus nav-icon-default" src="assets/icons/nav/add.svg" alt="" />
              <img class="nav-plus nav-icon-active"  src="assets/icons/nav/add-active.png" alt="" />
            </a>
            <a class="nav-btn" href="calendar.html" aria-label="Calendar">
              <img class="nav-cal nav-icon-default" src="assets/icons/nav/calendar.svg" alt="" />
              <img class="nav-cal nav-icon-active"  src="assets/icons/nav/calendar-active.png" alt="" />
            </a>
          </div>
        </nav>
        <div class="home-indicator" aria-hidden="true"></div>

      </main>
    </div>

    <script>
      (function () {

        /* ── Treat pool (prep-type) ───────────────────────── */
        var POOL = [
          { name: "Nice OOTD",           icon: "./assets/icons/treats/ootd.svg",          color: "#ffd3ea", sub: "Pick your outfit the night before" },
          { name: "Enjoy a warm drink",  icon: "./assets/icons/treats/warm-drink.svg",     color: "#fff5c5", sub: "Set out your mug and ingredients" },
          { name: "A simple breakfast",  icon: "./assets/icons/treats/breakfast.svg",      color: "#ffe2b8", sub: "Prep your ingredients so morning is easy" },
          { name: "2-minute journaling", icon: "./assets/icons/treats/journal.svg",  color: "#e5deff", sub: "Place your journal by the bed tonight" },
          { name: "Read a page",         icon: "./assets/icons/treats/book.svg",           color: "#d0f3c1", sub: "Leave your book on the nightstand" }
        ];

        /* Three shown at once; shuffle cycles through */
        var offset   = 0;
        var selected = null; /* index into current visible set */

        var listEl   = document.getElementById("pick-list");
        var ctaBtn   = document.getElementById("cta-btn");
        var remindBtn= document.getElementById("remind-btn");
        var shuffleBtn= document.getElementById("shuffle-btn");

        /* ── Build visible treat set ─────────────────────── */
        function visibleTreats() {
          var out = [];
          for (var i = 0; i < 3; i++) {
            out.push(POOL[(offset + i) % POOL.length]);
          }
          return out;
        }

        /* ── Render treat cards ──────────────────────────── */
        function render() {
          listEl.innerHTML = "";
          selected = null;
          ctaBtn.disabled = true;
          ctaBtn.classList.remove("active");

          var treats = visibleTreats();
          treats.forEach(function (treat, i) {
            var card = document.createElement("div");
            card.className = "pick-card";
            card.setAttribute("role", "button");
            card.setAttribute("tabindex", "0");
            card.setAttribute("aria-pressed", "false");
            card.dataset.idx = String(i);

            card.innerHTML =
              '<div class="pick-card-row">' +
                '<div class="pick-card-left">' +
                  '<img class="pick-card-icon" src="' + treat.icon + '" width="32" height="32" alt="" />' +
                  '<div>' +
                    '<p class="pick-card-title">' + treat.name + '</p>' +
                    '<p class="pick-card-desc">' + treat.sub + '</p>' +
                  '</div>' +
                '</div>' +
                '<button type="button" class="pick-chevron" aria-label="Show description" aria-expanded="false">' +
                  '<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
                    '<path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' +
                  '</svg>' +
                '</button>' +
              '</div>';

            /* Chevron: toggle subtitle, stop card selection */
            var chevron = card.querySelector(".pick-chevron");
            var desc    = card.querySelector(".pick-card-desc");
            chevron.addEventListener("click", function (e) {
              e.stopPropagation();
              var open = desc.classList.toggle("visible");
              chevron.classList.toggle("open", open);
              chevron.setAttribute("aria-expanded", String(open));
            });

            /* Card body: toggle selection */
            card.addEventListener("click", function (e) {
              if (e.target === chevron || chevron.contains(e.target)) return;

              var isSelected = card.classList.contains("selected");

              /* Deselect all */
              listEl.querySelectorAll(".pick-card").forEach(function (c) {
                c.classList.remove("selected");
                c.style.background = "";
                c.setAttribute("aria-pressed", "false");
              });

              if (isSelected) {
                /* toggle off */
                selected = null;
                ctaBtn.disabled = true;
                ctaBtn.classList.remove("active");
              } else {
                /* select this card */
                card.classList.add("selected");
                card.style.background = treat.color;
                card.setAttribute("aria-pressed", "true");
                selected = i;
                ctaBtn.disabled = false;
                ctaBtn.classList.add("active");
              }
            });

            listEl.appendChild(card);
          });
        }

        /* ── Shuffle ─────────────────────────────────────── */
        shuffleBtn.addEventListener("click", function () {
          offset = (offset + 1) % POOL.length;
          render();
        });

        /* ── "I'll do this tonight" ───────────────────────── */
        ctaBtn.addEventListener("click", function () {
          if (selected === null) return;
          var treat = visibleTreats()[selected];

          /* Save to morningTreats in sessionStorage */
          var existing = [];
          try { existing = JSON.parse(sessionStorage.getItem("morningTreats")) || []; }
          catch (e) { existing = []; }

          /* Avoid duplicates */
          var alreadyAdded = existing.some(function (t) {
            return t.name === treat.name && t.status === "pending";
          });

          if (!alreadyAdded) {
            existing.push({
              name:     treat.name,
              icon:     treat.icon,
              color:    treat.color,
              type:     "prep",
              status:   "pending",
              prepared: false
            });
            sessionStorage.setItem("morningTreats", JSON.stringify(existing));
          }

          /* Go to the instructions / checklist page */
          sessionStorage.setItem("activePrepTreat", treat.name);
          window.location.href = "prep-instructions.html";
        });

        /* ── "Remind me later" ───────────────────────────── */
        remindBtn.addEventListener("click", function () {
          if (selected !== null) {
            /* A treat was picked — queue it for tonight without going through the checklist */
            var treat = visibleTreats()[selected];
            var existing = [];
            try { existing = JSON.parse(sessionStorage.getItem("morningTreats")) || []; }
            catch (e) { existing = []; }

            var alreadyAdded = existing.some(function (t) {
              return t.name === treat.name && t.status === "pending";
            });

            if (!alreadyAdded) {
              existing.push({
                name:     treat.name,
                icon:     treat.icon,
                color:    treat.color,
                type:     "prep",
                status:   "pending",
                prepared: false
              });
              sessionStorage.setItem("morningTreats", JSON.stringify(existing));
            }
          } else {
            /* Nothing selected — show a gentle toast on home */
            sessionStorage.setItem("showRemindToast", "1");
          }

          window.location.href = "index.html";
        });

        /* ── Init ────────────────────────────────────────── */
        render();

      })();
    </script>
  </body>
</html>
